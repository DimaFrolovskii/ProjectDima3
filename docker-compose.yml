version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dima_postgres_db
    environment:
      POSTGRES_DB: project_dima_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d project_dima_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: dima_spring_app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/project_dima_db
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_FLYWAY_URL=jdbc:postgresql://db:5432/project_dima_db
      - SPRING_FLYWAY_USER=user
      - SPRING_FLYWAY_PASSWORD=password