<!DOCTYPE html>
<html lang="ru" class="light-theme"> <!-- Тема по умолчанию -->
<head>
    <meta charset="UTF-8">
    <title>Панель администратора</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="theme.js"></script>
</head>
<body>

<nav>
    <span>РУБИКОН: Admin Panel</span>
    <div>
        <a href="/assets.html" class="nav-link">Активы</a>
        <button id="theme-toggle" class="theme-toggle-button">🌙</button>
        <button onclick="logout()" class="logout-btn danger-btn">Выйти</button>
    </div>
</nav>

<main class="container">
    <h3>Пользователи</h3>
    <div class="table-container">
        <table id="usersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Имя пользователя</th>
                    <th>Роль</th>
                    <th>Компания</th>
                    <th>Отдел</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="usersBody"></tbody>
        </table>
    </div>
</main>

<!-- Модальное окно для информации о пользователе -->
<div id="userModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h4 id="modalUserName">Информация о пользователе</h4>
            <span class="close-button">&times;</span>
        </div>
        <div class="modal-body">
            <div class="form-grid">
                <p><strong>ID:</strong> <span id="modalUserId"></span></p>
                <p><strong>Роль:</strong> <span id="modalUserRole"></span></p>
            </div>
            <hr>
            <h5>Назначение</h5>
            <input type="hidden" id="userIdToAssign">
            <div class="form-grid">
                <select id="companySelect"></select>
                <select id="departmentSelect"></select>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="close-button-footer">Отмена</button>
            <button type="button" onclick="assignUser()">Сохранить</button>
        </div>
    </div>
</div>

<script src="auth.js"></script>
<script src="api.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        loadUsers();
        // loadStats(); // Эта функция не определена в предоставленном коде, поэтому закомментирована

        const userModal = document.getElementById('userModal');
        const openButtons = document.querySelectorAll('.open-user-modal'); // Предполагается, что у кнопок есть этот класс
        const closeButton = userModal.querySelector('.close-button');
        const closeButtonFooter = userModal.querySelector('.close-button-footer');

        const closeModal = () => userModal.style.display = 'none';

        closeButton.onclick = closeModal;
        closeButtonFooter.onclick = closeModal;
        window.onclick = (event) => {
            if (event.target == userModal) closeModal();
        };
    });
</script>
</body>
</html>
