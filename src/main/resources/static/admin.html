<!DOCTYPE html>
<html lang="ru" class="light-theme">
<head>
    <meta charset="UTF-8">
    <title>Панель администратора</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" href="data:,">

    <script>
        (function() {
            var theme = localStorage.getItem('theme-preference') || 'light';
            document.documentElement.className = theme + '-theme';
        })();
    </script>

</head>
<body>

<nav>
    <span>РУБИКОН: Admin Panel</span>
    <div>
        <a href="/assets.html" class="nav-link">Активы</a>
        <button id="theme-toggle" class="theme-toggle-button">🌙</button>
        <button onclick="logout()" class="logout-btn danger-btn">Выйти</button>
    </div>
</nav>

<main class="container">
    <!-- Секция пользователей -->
    <h3>Пользователи</h3>
    <div class="table-container">
        <table id="usersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Имя пользователя</th>
                    <th>Роль</th>
                    <th>Компания</th>
                    <th>Отдел</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="usersBody"></tbody>
        </table>
    </div>

    <hr class="section-divider">

    <!-- Секция управления компаниями и отделами -->
    <div class="management-grid">
        <!-- Управление компаниями -->
        <section>
            <h4>Управление компаниями</h4>
            <form id="createCompanyForm" onsubmit="event.preventDefault(); createCompany();" class="management-form">
                <input type="text" id="companyName" placeholder="Название новой компании" required>
                <input type="text" id="companyAddress" placeholder="Адрес">
                <button type="submit">Создать компанию</button>
            </form>
            <h5>Существующие компании:</h5>
            <ul id="companyList" class="item-list"></ul>
        </section>

        <!-- Управление отделами -->
        <section>
            <h4>Управление отделами</h4>
            <form id="createDepartmentForm" onsubmit="event.preventDefault(); createDepartment();" class="management-form">
                <select id="departmentCompanySelect" required>
                    <option value="">Выберите компанию</option>
                </select>
                <input type="text" id="departmentName" placeholder="Название нового отдела" required>
                <button type="submit">Создать отдел</button>
            </form>
            <h5>Существующие отделы:</h5>
            <ul id="departmentList" class="item-list"></ul>
        </section>
    </div>
</main>

<!-- Модальное окно для информации о пользователе -->
<div id="userModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h4 id="modalUserName">Информация о пользователе</h4>
            <span class="close-button">&times;</span>
        </div>
        <div class="modal-body">
            <div class="form-grid">
                <p><strong>ID:</strong> <span id="modalUserId"></span></p>
                <p><strong>Роль:</strong> <span id="modalUserRole"></span></p>
            </div>
            <hr>
            <h5>Назначение</h5>
            <input type="hidden" id="userIdToAssign">
            <div class="form-grid">
                <select id="companySelect"></select>
                <select id="departmentSelect"></select>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="close-button-footer">Отмена</button>
            <button type="button" onclick="assignUser()">Сохранить</button>
        </div>
    </div>
</div>

<script src="auth.js"></script>
<script src="api.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Загрузка основных данных
        loadUsers();
        loadCompanyList();
        loadDepartmentList();

        // Логика модального окна
        const userModal = document.getElementById('userModal');
        const closeButton = userModal.querySelector('.close-button');
        const closeButtonFooter = userModal.querySelector('.close-button-footer');

        const closeModal = () => userModal.style.display = 'none';

        closeButton.onclick = closeModal;
        closeButtonFooter.onclick = closeModal;
        window.onclick = (event) => {
            if (event.target == userModal) closeModal();
        };
    });
</script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var THEME_KEY = 'theme-preference';
        var btn = document.getElementById('theme-toggle');

        function getTheme() {
            return localStorage.getItem(THEME_KEY) || 'light';
        }

        function applyTheme(theme) {
            document.documentElement.className = theme + '-theme';
            if (btn) btn.innerHTML = theme === 'dark' ? '☀️' : '🌙';
        }

        applyTheme(getTheme()); // обновляем иконку кнопки

        if (btn) {
            btn.addEventListener('click', function() {
                var newTheme = getTheme() === 'light' ? 'dark' : 'light';
                localStorage.setItem(THEME_KEY, newTheme);
                applyTheme(newTheme);
            });
        }
    });
</script>
</body>
</html>
