<!DOCTYPE html>
<html lang="ru" class="light-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация - ProjectDima3</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <script>
        (function() {
            var theme = localStorage.getItem('theme-preference') || 'light';
            document.documentElement.className = theme + '-theme';
        })();
    </script>

</head>
<body class="auth-body">

<button id="theme-toggle" class="theme-toggle-button">🌙</button>

<main class="container">
    <h3>Авторизация</h3>
    <div id="error" style="color: var(--danger); margin-bottom: 1rem;"></div>
    <form onsubmit="event.preventDefault(); login();">
        <div class="form-grid">
            <input type="text" id="username" placeholder="Логин" required>
            <input type="password" id="password" placeholder="Пароль" required>
        </div>
        <button type="submit">Войти</button>
    </form>
    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
        Нет аккаунта? <a href="register.html" style="color: var(--primary); text-decoration: none;">Зарегистрироваться</a>
    </div>
</main>

<script src="auth.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var THEME_KEY = 'theme-preference';
        var btn = document.getElementById('theme-toggle');

        function getTheme() {
            return localStorage.getItem(THEME_KEY) || 'light';
        }

        function applyTheme(theme) {
            document.documentElement.className = theme + '-theme';
            if (btn) btn.innerHTML = theme === 'dark' ? '☀️' : '🌙';
        }

        applyTheme(getTheme()); // обновляем иконку кнопки

        if (btn) {
            btn.addEventListener('click', function() {
                var newTheme = getTheme() === 'light' ? 'dark' : 'light';
                localStorage.setItem(THEME_KEY, newTheme);
                applyTheme(newTheme);
            });
        }
    });
</script>

</body>
</html>
