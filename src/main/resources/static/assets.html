<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление активами</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav style="width: 100%; background: #333; color: white; padding: 10px; display: flex; justify-content: space-around;">
        <span>ProjectDima3: Assets</span>
        <button onclick="logout()" style="width: auto; background: #dc3545;">Выйти</button>
    </nav>

    <div class="container" style="width: 80%; max-width: 900px;">
        <h3>Добавить новый актив</h3>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="assetName" placeholder="Название">
            <input type="text" id="assetType" placeholder="Тип (например, Сервер)">
            <input type="text" id="assetStatus" placeholder="Статус (Работает)">
            <button onclick="saveAsset()" style="width: 150px;">Создать</button>
        </div>
    </div>

    <table id="assetsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Тип</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody id="assetsBody">
            </tbody>
    </table>

    <script src="api.js"></script>
    <script>
        // Загружаем данные при открытии страницы
        document.addEventListener('DOMContentLoaded', loadAssets);
    </script>
</body>
</html>
