<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление активами</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<nav>
    <span>ProjectDima3: Assets</span>
    <div>
        <a href="/admin.html" id="admin-panel-link" class="nav-link">Админ-панель</a>
        <button onclick="logout()" class="logout-btn">Выйти</button>
    </div>
</nav>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>Активы</h3>
        <button onclick="openAssetModal(null)">Создать актив</button>
    </div>
</div>

<div class="table-container">
    <table id="assetsTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Тип</th>
            <th>Статус</th>
            <th style="text-align: right;">Действия</th>
        </tr>
        </thead>
        <tbody id="assetsBody">
        </tbody>
    </table>
</div>

<!-- Модальное окно для активов -->
<div id="assetModal" class="modal">
    <div class="modal-content">
        <span class="close-button">&times;</span>
        <h4 id="assetModalTitle">Создать актив</h4>
        <form id="assetForm">
            <input type="hidden" id="assetId">
            <div class="form-grid">
                <input type="text" id="assetName" placeholder="Название актива" required>
                <input type="text" id="assetType" placeholder="Тип актива" required>
                <input type="text" id="assetStatus" placeholder="Статус актива" required>
            </div>
            <button type="button" onclick="saveAsset()">Сохранить</button>
            <button type="button" id="deleteAssetBtn" class="danger-btn" onclick="deleteAsset()" style="display: none;">Удалить</button>
        </form>
    </div>
</div>

<script src="auth.js"></script>
<script src="api.js"></script>
<script>
    window.onload = function() {
        loadAssets();

        const userRole = localStorage.getItem('userRole');
        const adminLink = document.getElementById('admin-panel-link');
        if (userRole !== 'ROLE_ADMIN' && userRole !== 'ADMIN') {
            if (adminLink) {
                adminLink.style.display = 'none';
            }
        }
    };

    const assetModal = document.getElementById('assetModal');
    const closeButton = assetModal.querySelector('.close-button');

    closeButton.onclick = function() {
        assetModal.style.display = 'none';
    }

    window.onclick = function(event) {
        if (event.target == assetModal) {
            assetModal.style.display = 'none';
        }
    }
</script>
</body>
</html>
