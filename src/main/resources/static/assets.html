<!DOCTYPE html>
<html lang="ru" class="light-theme"> <!-- Тема по умолчанию -->
<head>
    <meta charset="UTF-8">
    <title>Управление активами</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="theme.js"></script>
</head>
<body>

<nav>
    <span>РУБИКОН: Активы</span>
    <div>
        <a href="/admin.html" id="admin-panel-link" class="nav-link">Админ-панель</a>
        <button id="theme-toggle" class="theme-toggle-button">🌙</button>
        <button onclick="logout()" class="logout-btn danger-btn">Выйти</button>
    </div>
</nav>

<main class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h3>Активы</h3>
        <button onclick="openAssetModal(null)">Создать актив</button>
    </div>
    <div class="table-container">
        <table id="assetsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Тип</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="assetsBody"></tbody>
        </table>
    </div>
</main>

<!-- Модальное окно для активов -->
<div id="assetModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h4 id="assetModalTitle">Создать актив</h4>
            <span class="close-button">&times;</span>
        </div>
        <div class="modal-body">
            <form id="assetForm">
                <input type="hidden" id="assetId">
                <div class="form-grid">
                    <input type="text" id="assetName" placeholder="Название актива" required>
                    <input type="text" id="assetType" placeholder="Тип актива" required>
                    <input type="text" id="assetStatus" placeholder="Статус актива" required>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="close-button-footer">Отмена</button>
            <button type="button" id="deleteAssetBtn" class="danger-btn" style="display: none; margin-right: auto;">Удалить</button>
            <button type="button" onclick="saveAsset()">Сохранить</button>
        </div>
    </div>
</div>

<script src="auth.js"></script>
<script src="api.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        loadAssets();

        const userRole = localStorage.getItem('userRole');
        const adminLink = document.getElementById('admin-panel-link');
        if (userRole !== 'ROLE_ADMIN' && userRole !== 'ADMIN') {
            if (adminLink) adminLink.style.display = 'none';
        }

        const assetModal = document.getElementById('assetModal');
        const openModalBtn = document.querySelector('button[onclick="openAssetModal(null)"]');
        const closeButton = assetModal.querySelector('.close-button');
        const closeButtonFooter = assetModal.querySelector('.close-button-footer');

        const openModal = () => assetModal.style.display = 'block';
        const closeModal = () => assetModal.style.display = 'none';

        openModalBtn.onclick = (e) => {
            e.preventDefault();
            openAssetModal(null); // Ваша функция
            openModal();
        };

        closeButton.onclick = closeModal;
        closeButtonFooter.onclick = closeModal;
        window.onclick = (event) => {
            if (event.target == assetModal) closeModal();
        };
    });
</script>
</body>
</html>
