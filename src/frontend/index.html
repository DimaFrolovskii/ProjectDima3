<!DOCTYPE html>
<html>
<head>
    <title>Вход в систему КИИ</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; margin-top: 100px; background: #f4f4f4; }
        .form-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { display: block; margin: 10px 0; padding: 8px; width: 250px; }
        button { width: 100%; padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Вход в ProjectDima3</h2>
    <input type="text" id="username" placeholder="Логин">
    <input type="password" id="password" placeholder="Пароль">
    <button onclick="login()">Войти</button>
    <p id="error" style="color: red;"></p>
</div>

<script>
    async function login() {
        const user = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        const response = await fetch('http://localhost:8080/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(user)
        });

        if (response.ok) {
            const token = await response.text();
            localStorage.setItem('jwtToken', token); // Сохраняем токен
            window.location.href = 'dashboard.html'; // Переходим в личный кабинет
        } else {
            document.getElementById('error').innerText = 'Ошибка входа!';
        }
    }
</script>
</body>
</html>
